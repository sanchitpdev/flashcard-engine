# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY_MS:900000}
app.jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY_MS:604800000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.cuemath.flashcard=DEBUG
logging.level.org.springframework.security=INFO

# Multipart (PDF upload)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# € AI Providers
# Primary: Gemini 2.0 Flash (free tier - 1500 req/day, 1M tokens/min)
# Get key: https://aistudio.google.com/app/apikey
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=${GEMINI_MODEL:gemini-2.5-flash}

# Fallback: Grok 3 Mini (free tier - 60 req/min)
# Get key: https://console.x.ai/
grok.api.key=${GROK_API_KEY}
grok.api.model=${GROK_MODEL:grok-3-mini}
