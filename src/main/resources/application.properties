# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY_MS:900000}
app.jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY_MS:604800000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.cuemath.flashcard=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=INFO

# Multipart (PDF upload)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI Providers
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=${GEMINI_MODEL:gemini-2.5-flash}